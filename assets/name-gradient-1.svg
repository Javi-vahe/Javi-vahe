<svg xmlns="http://www.w3.org/2000/svg" width="940" height="148" viewBox="0 0 940 148" role="img" aria-label="Zhiyou Guan - Physical AI, Embodied Intelligence, World Models, Multimodal Foundation Models">
  <defs>
    <linearGradient id="nameGradient" x1="0" y1="0" x2="940" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="18%" stop-color="#1F6FEB"/>
      <stop offset="36%" stop-color="#22D3EE"/>
      <stop offset="54%" stop-color="#A78BFA"/>
      <stop offset="72%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#58A6FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;260 0;-260 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="subGradient" x1="210" y1="0" x2="730" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9BD8FF" stop-opacity="0.72"/>
      <stop offset="50%" stop-color="#F5F7FA" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.62 0 0 0 0 1 0 0 0 0.65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="940" height="148" rx="24" fill="#0B1020" opacity="0"/>
  <g opacity="0.48">
    <path d="M70 104 C220 26, 360 134, 520 58 S760 38, 870 96" fill="none" stroke="#58A6FF" stroke-width="1.2" stroke-dasharray="7 13">
      <animate attributeName="stroke-dashoffset" values="0;-80" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M112 38 C255 112, 406 16, 556 90 S764 124, 838 44" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 16">
      <animate attributeName="stroke-dashoffset" values="0;70" dur="10s" repeatCount="indefinite"/>
    </path>
    <circle cx="142" cy="48" r="2.3" fill="#9BD8FF"><animate attributeName="opacity" values="0.25;0.9;0.25" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="732" cy="78" r="2.1" fill="#C084FC"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="806" cy="42" r="1.8" fill="#22D3EE"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>
  <text x="470" y="78" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0.8" fill="url(#nameGradient)" filter="url(#softGlow)">Zhiyou Guan</text>
  <text x="470" y="113" text-anchor="middle" font-family="Fira Code, JetBrains Mono, Consolas, monospace" font-size="13.8" font-weight="600" letter-spacing="0.25" fill="url(#subGradient)">Physical AI · Embodied Intelligence · World Models · Multimodal Foundation Models</text>
</svg>
